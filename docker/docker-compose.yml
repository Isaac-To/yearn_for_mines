version: '3.8'

services:
  minecraft-server:
    image: itzg/minecraft-server:java21
    container_name: yfm-minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.4"
      MODE: "survival"
      MOTD: "Yearn for Mines - Agent Testing"
      DIFFICULTY: "peaceful"
      ONLINE_MODE: "false"
      MAX_PLAYERS: 5
      VIEW_DISTANCE: 10
      SPAWN_PROTECTION: 0
      WHITE_LIST: "false"
      OPS: "YearnForMines"
    volumes:
      - minecraft-data:/data
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "localhost", "--port", "25565"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  mempalace:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mempalace
    container_name: yfm-mempalace
    stop_grace_period: 10s
    volumes:
      - mempalace-data:/data
    ports:
      - "8081:8080"
    environment:
      MEMPALACE_DATA_DIR: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "POST", "http://localhost:8080/mcp", "-H", "Content-Type: application/json", "-H", "Accept: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"health\",\"version\":\"0.1\"}}}"]
      interval: 15s
      timeout: 5s
      retries: 5

  mc-mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mc-mcp-server
    container_name: yfm-mc-mcp-server
    stop_grace_period: 10s
    ports:
      - "3000:3000"
    environment:
      MC_HOST: minecraft-server
      MC_PORT: 25565
      MC_USERNAME: YearnForMines
      MC_VERSION: "1.21.4"
      MC_AUTH: offline
      MCP_PORT: 3000
      MCP_HOST: "0.0.0.0"
    depends_on:
      minecraft-server:
        condition: service_healthy

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: yfm-agent
    stop_grace_period: 15s
    environment:
      MCP_MC_URL: http://mc-mcp-server:3000/mcp
      MCP_MEMPALACE_URL: http://mempalace:8080/mcp
      LLM_BASE_URL: http://host.docker.internal:11434/v1
      LLM_MODEL: gemma4:31b-cloud
      LLM_VISION_MODEL: gemma4:31b-cloud
      AGENT_GOAL: "Find a tree and gather wood"
    depends_on:
      - mc-mcp-server
      - mempalace

  web-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web-ui
    container_name: yfm-web-ui
    stop_grace_period: 10s
    ports:
      - "5173:8080"
    environment:
      PORT: 8080
      MCP_MC_URL: http://mc-mcp-server:3000/mcp
    depends_on:
      - mc-mcp-server
      - agent

volumes:
  minecraft-data:
  mempalace-data: